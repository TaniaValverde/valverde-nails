<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Servicios | Valverde Nails</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#1b1c1b", "secondary-container": "#f4dbcc", "on-secondary-container": "#725f53", "surface-container-lowest": "#ffffff", "on-primary-container": "#67444c", "surface-container-high": "#eae8e6", "primary-fixed-dim": "#e9bbc4", "outline": "#817476", "tertiary": "#645d55", "surface-container-low": "#f5f3f1", "surface": "#fbf9f7", "tertiary-fixed": "#ebe1d6", "on-surface-variant": "#4f4446", "tertiary-fixed-dim": "#cec5bb", "primary-container": "#e2b4bd", "surface-container": "#efedec", "outline-variant": "#d3c2c5", "on-primary": "#ffffff", "tertiary-container": "#c7beb4", "background": "#fbf9f7", "secondary": "#6d5b4f", "primary": "#79545c", "inverse-primary": "#e9bbc4", "surface-dim": "#dbdad8"
                    },
                    fontFamily: {
                        "display-lg": ["Playfair Display"], "headline-lg": ["Playfair Display"], "headline-md": ["Playfair Display"], "body-md": ["Montserrat"], "label-md": ["Montserrat"]
                    },
                    fontSize: {
                        "headline-lg": ["28px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-md": ["22px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["13px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        html, body { height: 100%; overflow-x: hidden; }
        body { background: linear-gradient(135deg, #ffffff 0%, #f7decf 100%); color: #1b1c1b; font-family: 'Montserrat', sans-serif; margin: 0; }
        .glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(213,189,175,0.3); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; vertical-align: middle; }
        .sidebar { width: 220px; }
        .topbar { left: 220px; width: calc(100% - 220px); }
        .main { margin-left: 220px; }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden">

    <!-- SIDEBAR -->
    <nav class="sidebar fixed left-0 top-0 h-screen bg-surface-container-low border-r border-outline-variant/30 flex flex-col py-8 px-4 z-50">
        <div class="mb-8 px-2">
            <h1 class="font-display-lg text-headline-md text-primary tracking-tight leading-tight">Valverde</h1>
            <p class="text-[10px] font-semibold text-on-surface-variant/60 uppercase tracking-widest mt-0.5">Nail Artistry</p>
        </div>
        <div class="flex-1 space-y-1">
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/dashboard-cliente}">
                <span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">dashboard</span>
                <span class="font-semibold">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/agendar-cita}">
                <span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">calendar_add_on</span>
                <span class="font-semibold">Agendar Cita</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/mis-citas}">
                <span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">event_note</span>
                <span class="font-semibold">Mis Citas</span>
            </a>
            <!-- Activo: Servicios -->
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary font-bold border-r-4 border-primary bg-secondary-container/20 text-sm" th:href="@{/servicios-cliente}">
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">layers</span>
                <span class="font-semibold">Servicios</span>
            </a>
        </div>
        <a th:href="@{/logout}" class="block text-center bg-primary text-on-primary py-2.5 rounded-full text-sm font-semibold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform active:scale-95 mx-1">
            Cerrar sesión
        </a>
    </nav>

    <!-- TOPBAR -->
    <header class="topbar fixed top-0 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex justify-between items-center px-6 z-40 shadow-sm shadow-primary/5">
        <div class="flex items-center gap-4">
            <button class="text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-[22px]">notifications</span>
            </button>
            <button class="text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-[22px]">settings</span>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main pt-16 min-h-screen">
        <div class="px-7 py-8 max-w-full">

            <!-- Header -->
            <div class="flex items-center gap-3 mb-8">
                <div class="w-11 h-11 rounded-xl bg-primary-container/30 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[26px]">layers</span>
                </div>
                <h2 class="font-headline-lg text-headline-lg text-on-surface">Servicios</h2>
            </div>

            <!-- Cards de servicios -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                <div th:each="servicio : ${servicios}"
                     class="glass-card rounded-xl p-6 flex flex-col gap-4 hover:shadow-lg hover:shadow-primary/10 transition-shadow">

                    <!-- Icono + nombre -->
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-lg bg-primary-container/40 flex items-center justify-center text-primary flex-shrink-0">
                            <span class="material-symbols-outlined text-[22px]">spa</span>
                        </div>
                        <div>
                            <p class="font-semibold text-on-surface text-sm" th:text="${servicio.nombre}"></p>
                            <p class="text-xs text-on-surface-variant mt-0.5" th:text="${servicio.descripcion}"></p>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="border-t border-outline-variant/20"></div>

                    <!-- Precio y duración -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-1.5 text-primary">
                            <span class="material-symbols-outlined text-[16px]">payments</span>
                            <span class="font-semibold text-sm" th:text="'₡' + ${#numbers.formatInteger(servicio.precio, 1, 'COMMA')}"></span>
                        </div>
                        <div class="flex items-center gap-1.5 text-on-surface-variant">
                            <span class="material-symbols-outlined text-[16px]">schedule</span>
                            <span class="text-xs font-medium" th:text="${servicio.duracion} + ' min'"></span>
                        </div>
                    </div>


                </div>
            </div>

            <!-- Volver -->
            <footer class="mt-8">
                <a class="group inline-flex items-center gap-1 text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors" th:href="@{/dashboard-cliente}">
                    <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Volver al Dashboard
                </a>
            </footer>

        </div>
    </main>

    <!-- Fondo decorativo -->
    <div class="fixed inset-0 pointer-events-none -z-10 opacity-25">
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-container/20 rounded-full blur-[80px]"></div>
        <div class="absolute bottom-[-5%] left-[15%] w-80 h-80 bg-secondary-container/20 rounded-full blur-[70px]"></div>
    </div>

</body>
</html>
