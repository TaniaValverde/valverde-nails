<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Formulario Cliente | Valverde Nails</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "on-surface":"#1b1c1b","secondary-container":"#f4dbcc","on-secondary":"#ffffff","primary-fixed":"#ffd9e0","surface-container-lowest":"#ffffff","on-primary-container":"#67444c","surface-container-high":"#eae8e6","outline":"#817476","tertiary":"#645d55","surface-container-low":"#f5f3f1","surface":"#fbf9f7","on-surface-variant":"#4f4446","on-error":"#ffffff","primary-container":"#e2b4bd","surface-container":"#efedec","on-tertiary":"#ffffff","surface-tint":"#79545c","outline-variant":"#d3c2c5","error":"#ba1a1a","error-container":"#ffdad6","on-primary":"#ffffff","tertiary-container":"#c7beb4","background":"#fbf9f7","secondary":"#6d5b4f","primary":"#79545c","on-background":"#1b1c1b","inverse-primary":"#e9bbc4","surface-dim":"#dbdad8","surface-container-highest":"#e4e2e0"
                },
                borderRadius: {"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
                /* Dell 5420 @ Chrome 125% → viewport efectivo 1536×864 */
                spacing: {
                    "xl":"40px","gutter":"20px","md":"20px","xs":"4px",
                    "sm":"10px","base":"8px","lg":"32px","container-margin":"28px"
                },
                fontFamily: {
                    "label-md":["Montserrat"],"display-lg":["Playfair Display"],
                    "headline-lg":["Playfair Display"],"body-md":["Montserrat"],"headline-md":["Playfair Display"]
                },
                fontSize: {
                    "label-md":   ["13px",{"lineHeight":"1.2","letterSpacing":"0.05em","fontWeight":"600"}],
                    "caption":    ["11px",{"lineHeight":"1.4","fontWeight":"400"}],
                    "headline-lg":["28px",{"lineHeight":"1.2","fontWeight":"500"}],
                    "body-md":    ["14px",{"lineHeight":"1.5","fontWeight":"400"}],
                    "headline-md":["22px",{"lineHeight":"1.3","fontWeight":"500"}]
                }
            },
        },
    }
</script>
<style>
    html, body { height: 100%; overflow-x: hidden; }
    body { background-color: #fbf9f7; color: #1b1c1b; font-family: 'Montserrat', sans-serif; margin: 0; }
    .glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(213,189,175,0.3); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; vertical-align: middle; }
    .sidebar { width: 220px; }
    .topbar  { left: 220px; width: calc(100% - 220px); }
    .main    { margin-left: 220px; }
    input:focus { outline: none; }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">

<!-- ── SIDEBAR 220px ── -->
<nav class="sidebar fixed left-0 top-0 h-screen bg-surface-container-low border-r border-outline-variant/30 flex flex-col py-8 px-4 z-50">
    <div class="mb-8 px-2">
        <h1 class="font-display-lg text-headline-md text-primary tracking-tight leading-tight">Valverde</h1>
        <p class="text-[10px] font-semibold text-on-surface-variant/60 uppercase tracking-widest mt-0.5">Nail Artistry</p>
    </div>
    <div class="flex-1 space-y-1">
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/dashboard-admin}">
            <span class="material-symbols-outlined text-[20px]">dashboard</span>
            <span class="font-semibold">Dashboard</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/citas}">
            <span class="material-symbols-outlined text-[20px]">calendar_month</span>
            <span class="font-semibold">Citas</span>
        </a>
        <!-- Activo: Clientes -->
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary font-bold border-r-4 border-primary bg-secondary-container/20 text-sm" th:href="@{/clientes}">
            <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">group</span>
            <span class="font-semibold">Clientes</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/servicios}">
            <span class="material-symbols-outlined text-[20px]">layers</span>
            <span class="font-semibold">Servicios</span>
        </a>
        <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-primary hover:bg-secondary-container/10 transition-colors group text-sm" th:href="@{/pagos}">
            <span class="material-symbols-outlined text-[20px]">credit_card</span>
            <span class="font-semibold">Pagos</span>
        </a>
    </div>
    <a th:href="@{/logout}" class="block text-center bg-primary text-on-primary py-2.5 rounded-full text-sm font-semibold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform active:scale-95 mx-1">
        Cerrar sesión
    </a>
</nav>

<!-- ── TOPBAR ── -->
<header class="topbar fixed top-0 h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center px-6 z-40 shadow-sm shadow-primary/5">
    <span class="text-[12px] font-semibold text-on-surface-variant uppercase tracking-widest">
        Clientes / <span class="text-primary" th:text="${cliente.idCliente != null} ? 'Editar' : 'Nuevo'">Nuevo</span>
    </span>
</header>

<!-- ── MAIN ── -->
<main class="main pt-16 min-h-screen">
    <div class="px-7 py-8 max-w-xl">

        <!-- Encabezado -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-11 h-11 rounded-xl bg-primary-container/30 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-[24px]">person_add</span>
            </div>
            <h2 class="font-headline-lg text-headline-lg text-on-surface"
                th:text="${cliente.idCliente != null} ? 'Editar Cliente' : 'Nuevo Cliente'">
                Nuevo Cliente
            </h2>
        </div>

        <!-- Formulario -->
        <div class="glass-card rounded-xl shadow-xl shadow-primary/5 p-6">
            <form th:action="@{/clientes/guardar}"
                  th:object="${cliente}"
                  method="post"
                  class="space-y-4">

                <input type="hidden" name="idCliente" th:value="${cliente.idCliente}">

                <!-- Nombre -->
                <div>
                    <label class="block text-[13px] font-semibold text-on-surface-variant mb-1.5">
                        Nombre completo
                    </label>
                    <input type="text"
                           th:field="*{nombre}"
                           placeholder="Ej: Valentina Mendoza"
                           class="w-full px-4 py-2.5 bg-surface-container rounded-lg border border-outline-variant/40 focus:ring-2 focus:ring-primary/30 focus:border-primary/50 text-[13px] transition-all"
                           required/>
                </div>

                <!-- Teléfono -->
                <div>
                    <label class="block text-[13px] font-semibold text-on-surface-variant mb-1.5">
                        Teléfono
                    </label>
                    <input type="text"
                           th:field="*{telefono}"
                           placeholder="Ej: +506 8888 9999"
                           class="w-full px-4 py-2.5 bg-surface-container rounded-lg border border-outline-variant/40 focus:ring-2 focus:ring-primary/30 focus:border-primary/50 text-[13px] transition-all"
                           required/>
                </div>

                <!-- Correo -->
                <div>
                    <label class="block text-[13px] font-semibold text-on-surface-variant mb-1.5">
                        Correo electrónico
                    </label>
                    <input type="email"
                           th:field="*{correo}"
                           placeholder="Ej: cliente@correo.com"
                           class="w-full px-4 py-2.5 bg-surface-container rounded-lg border border-outline-variant/40 focus:ring-2 focus:ring-primary/30 focus:border-primary/50 text-[13px] transition-all"
                           required/>
                </div>
<!-- Contraseña -->
<div>
    <label class="block text-[13px] font-semibold text-on-surface-variant mb-1.5">
        Contraseña
    </label>

    <input
        type="password"
        name="password"
        placeholder="Ingrese una contraseña"
        class="w-full px-4 py-2.5 bg-surface-container rounded-lg border border-outline-variant/40 focus:ring-2 focus:ring-primary/30 focus:border-primary/50 text-[13px] transition-all"
        required>
</div>
                <!-- Botones -->
                <div class="flex gap-3 pt-1">
                    <button type="submit"
                            class="flex-1 flex items-center justify-center gap-2 bg-primary text-on-primary py-2.5 rounded-full text-sm font-semibold shadow-md shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-[18px]">save</span>
                        Guardar
                    </button>
                    <a th:href="@{/clientes}"
                       class="flex-1 flex items-center justify-center gap-2 border border-outline-variant text-on-surface-variant py-2.5 rounded-full text-sm font-semibold hover:bg-surface-container transition-all text-center">
                        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Cancelar
                    </a>
                </div>

            </form>
        </div>

    </div>
</main>

<!-- Atmósfera de fondo -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-25">
    <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-container/20 rounded-full blur-[80px]"></div>
    <div class="absolute bottom-[-5%] left-[15%] w-80 h-80 bg-secondary-container/20 rounded-full blur-[70px]"></div>
</div>

</body>
</html>
