<!DOCTYPE html>
<html class="light" lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Registro | Valverde Nails</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&amp;family=Playfair+Display:ital,wght@0,500;0,600;1,500&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e4e2e0",
                        "on-secondary-container": "#725f53",
                        "inverse-on-surface": "#f2f0ee",
                        "secondary": "#6d5b4f",
                        "error": "#ba1a1a",
                        "on-background": "#1b1c1b",
                        "surface-bright": "#fbf9f7",
                        "on-primary-container": "#67444c",
                        "outline-variant": "#d3c2c5",
                        "surface": "#fbf9f7",
                        "surface-variant": "#e4e2e0",
                        "outline": "#817476",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#30302f",
                        "on-surface": "#1b1c1b",
                        "primary-container": "#e2b4bd",
                        "tertiary-fixed": "#ebe1d6",
                        "inverse-primary": "#e9bbc4",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#4f4446",
                        "surface-container-high": "#eae8e6",
                        "secondary-container": "#f4dbcc",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f5f3f1",
                        "tertiary-container": "#c7beb4",
                        "error-container": "#ffdad6",
                        "background": "#fbf9f7",
                        "primary-fixed": "#ffd9e0",
                        "surface-tint": "#79545c",
                        "tertiary": "#645d55",
                        "primary-fixed-dim": "#e9bbc4",
                        "surface-dim": "#dbdad8",
                        "surface-container": "#efedec",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#f7decf",
                        "primary": "#79545c",
                        "on-secondary-fixed": "#261910",
                        "secondary-fixed-dim": "#dac2b4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "base": "8px",
                        "xl": "80px",
                        "xs": "4px",
                        "container-margin": "32px",
                        "gutter": "24px",
                        "sm": "12px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Montserrat"],
                        "caption": ["Montserrat"],
                        "label-md": ["Montserrat"],
                        "display-lg": ["Playfair Display"],
                        "headline-md": ["Playfair Display"],
                        "body-lg": ["Montserrat"],
                        "headline-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "500" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #fbf9f7;
            background-image:
                radial-gradient(at 0% 0%, rgba(226, 180, 189, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(213, 189, 175, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(226, 180, 189, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(213, 189, 175, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(213, 189, 175, 0.3);
            box-shadow: 0 20px 40px rgba(226, 180, 189, 0.1);
        }

        .input-focus-effect:focus {
            outline: none;
            border-color: #79545c;
            box-shadow: 0 0 0 2px rgba(226, 180, 189, 0.2);
        }

        .floating-accent {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(226, 180, 189, 0.2) 0%, rgba(226, 180, 189, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .btn-rose-gold {
            background-color: #e2b4bd;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-rose-gold:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
            box-shadow: 0 4px 12px rgba(226, 180, 189, 0.4);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="font-body-md text-on-surface antialiased">

    <div class="floating-accent top-[-10%] left-[-10%]"></div>
    <div class="floating-accent bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>

    <main class="w-full max-w-md px-6 py-xl relative z-10">
        <div class="glass-card rounded-xl p-lg flex flex-col items-center">

            <!-- Logo -->
            <div class="mb-xs transition-transform duration-500 hover:scale-105 flex justify-center">
                <img th:src="@{/assets/img/logo.png}" alt="Valverde Nails Logo" class="w-28 h-28 object-contain" />
            </div>

            <!-- Título -->
            <h1 class="font-headline-lg text-primary text-center mb-xs">Crear cuenta</h1>
            <p class="font-body-md text-on-surface-variant text-center mb-md">Únete a Valverde Nails</p>

            <!-- Mensaje de correo duplicado -->
            <div th:if="${errorCorreo}"
                 class="w-full mb-md p-sm bg-error-container text-on-error-container rounded-lg text-center font-caption">
                <p th:text="${errorCorreo}"></p>
            </div>

            <!-- Formulario -->
            <form action="/registro" method="post" class="w-full flex flex-col gap-md">

                <!-- Nombre -->
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">person</span>
                    <input type="text" name="nombre" required placeholder="Nombre completo"
                           th:value="${usuario != null ? usuario.nombre : ''}"
                           class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-effect transition-all duration-300" />
                </div>

                <!-- Teléfono -->
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">phone</span>
                    <input type="tel" name="telefono" required placeholder="Teléfono"
                           class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-effect transition-all duration-300" />
                </div>

                <!-- Correo -->
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
                    <input type="email" name="correo" required placeholder="Correo electrónico"
                           th:value="${usuario != null ? usuario.correo : ''}"
                           class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-effect transition-all duration-300" />
                </div>

                <!-- Contraseña -->
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
                    <input type="password" name="password" required placeholder="Contraseña"
                           class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-effect transition-all duration-300" />
                </div>

                <!-- Botón -->
                <button type="submit"
                        class="w-full btn-rose-gold text-on-primary font-label-md py-sm rounded-lg shadow-sm tracking-wide uppercase mt-sm">
                    Registrarse
                </button>
            </form>

            <!-- Volver al login -->
            <div class="mt-md text-center">
                <p class="font-caption text-on-surface-variant">
                    ¿Ya tenés una cuenta?
                    <a class="text-primary font-semibold hover:underline decoration-primary-container underline-offset-4 ml-xs"
                       th:href="@{/login}">Iniciar sesión</a>
                </p>
            </div>

        </div>

        <footer class="mt-lg text-center">
            <p class="font-caption text-outline opacity-60">© 2026 Valverde Nails. Elevated Artistry.</p>
        </footer>
    </main>

    <script>
        // Efecto de color en íconos al enfocar
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.color = '#79545c';
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.color = '#817476';
            });
        });

        // Animación de entrada suave
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            requestAnimationFrame(() => {
                main.style.transition = 'all 1s cubic-bezier(0.22, 1, 0.36, 1)';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            });
        });
    </script>

</body>
</html>
